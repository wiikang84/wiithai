<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wiiInfo · 점포 등록 (운영자)</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="./styles.css?v=20260618-19" />
    <style>
      /* [2026-06-18] master 점포 등록폼 데모 — 운영자(master) 전용. 점주 셀프(owner.html)는 추후 */
      .adminWrap { width: min(720px, 100%); margin: 0 auto; padding: 24px 16px 80px; display: grid; gap: 18px; }
      .adminCard { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); padding: 20px; }
      .adminCard h2 { margin: 0 0 4px; font-size: 20px; font-weight: var(--w-bold); color: var(--text); }
      .adminCard p.sub { margin: 0 0 16px; font-size: 13px; color: var(--muted); }
      .field { display: grid; gap: 6px; margin-bottom: 13px; }
      .field label { font-size: 12px; font-weight: var(--w-med); color: var(--text-secondary); }
      .field input, .field select, .field textarea {
        min-height: 44px; padding: 10px 13px; border: 1px solid var(--line); border-radius: var(--r-md);
        background: var(--surface-sunk); color: var(--text); font: inherit; outline: none;
      }
      .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }
      .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .primaryBtn { min-height: 48px; border: 0; border-radius: var(--r-md); background: var(--accent); color: #fff; font-weight: var(--w-bold); cursor: pointer; }
      .primaryBtn:disabled { background: var(--surface-sunk); color: var(--faint); cursor: not-allowed; }
      .ghostBtn { min-height: 40px; padding: 0 14px; border: 1px solid var(--line); border-radius: var(--r-pill); background: var(--surface); color: var(--text-secondary); cursor: pointer; font-weight: var(--w-med); }
      .storeRow { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--line); }
      .storeRow:last-child { border-bottom: 0; }
      .storeRow strong { font-size: 15px; color: var(--text); }
      .storeRow small { color: var(--muted); }
      .notice { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
      .pill { display: inline-block; padding: 3px 9px; border-radius: var(--r-pill); background: var(--accent-wash); color: var(--accent-ink); font-size: 12px; font-weight: var(--w-med); }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <main class="adminWrap">
      <div class="adminCard">
        <h2>wiiInfo 점포 등록 <span class="pill">운영자 데모</span></h2>
        <p class="sub">운영자(master)가 현장에서 수집한 점포를 등록합니다. (점주 셀프 등록은 추후 단계)</p>
        <div id="authArea">
          <button id="loginBtn" class="primaryBtn" type="button">Google로 로그인</button>
          <p id="authMsg" class="notice"></p>
        </div>
      </div>

      <div id="formCard" class="adminCard hidden">
        <h2>새 점포 등록</h2>
        <p class="sub">필수: 상호·카테고리·주소. 영업시간/전화는 알면 함께. 7개 언어 번역은 등록 후 운영에서 보강합니다.</p>
        <div class="field"><label>상호 (한국어)</label><input id="f_name_ko" placeholder="예: 아시아마트 언양" /></div>
        <div class="field"><label>상호 (영어, 선택)</label><input id="f_name_en" placeholder="e.g. Asia Mart Eonyang" /></div>
        <div class="row2">
          <div class="field"><label>카테고리</label>
            <select id="f_category">
              <option value="grocery">마트·식료품</option>
              <option value="restaurant">음식점</option>
              <option value="halal">할랄</option>
            </select>
          </div>
          <div class="field"><label>주요 국적 (쉼표로)</label><input id="f_nat" placeholder="vietnam, thai" /></div>
        </div>
        <div class="field"><label>주소</label><input id="f_address" placeholder="울산 울주군 언양읍 ..." /></div>
        <div class="row2">
          <div class="field"><label>전화 (선택)</label><input id="f_phone" placeholder="052-..." /></div>
          <div class="field"><label>영업시간 (선택, 자유 입력)</label><input id="f_hours" placeholder="평일 09:00~21:00" /></div>
        </div>
        <div class="field"><label>취급 품목 (선택)</label><input id="f_items" placeholder="라면, 향신료, 냉동식품" /></div>
        <div class="field"><label>점주 연락처 / 메모 (선택)</label><input id="f_owner" placeholder="사장님 연락처, 인수인계 메모" /></div>
        <div class="field"><label>대표 사진 URL (선택)</label><input id="f_photo" placeholder="https://... (가게 외관/음식 사진, 없으면 컬러 카드로 표시)" /></div>
        <button id="saveBtn" class="primaryBtn" type="button">점포 등록</button>
        <p id="saveMsg" class="notice"></p>
      </div>

      <div id="claimCard" class="adminCard hidden">
        <h2>사장님 등록 신청 <span class="pill">심사</span></h2>
        <p class="sub">승인하면 신청자(owner)가 해당 가게를 직접 관리할 수 있습니다. 가게명이 등록 점포와 일치하면 자동 연결됩니다.</p>
        <div id="claimList"></div>
      </div>

      <div id="listCard" class="adminCard hidden">
        <h2>등록된 점포</h2>
        <div id="storeList"></div>
      </div>
    </main>

    <script src="./vendor/firebase/10.12.5/firebase-app-compat.js?v=20260618-19"></script>
    <script src="./vendor/firebase/10.12.5/firebase-auth-compat.js?v=20260618-19"></script>
    <script src="./vendor/firebase/10.12.5/firebase-firestore-compat.js?v=20260618-19"></script>
    <script src="./firebase-config.js?v=20260618-19"></script>
    <script>
      (function () {
        // [2026-06-18] master 점포 등록 데모. master 판별은 이메일 화이트리스트(데모). 정식은 Custom Claims 예정.
        const MASTER_EMAILS = ["dy17715@naver.com", "tmzkt2@gmail.com", "ironyjk@gmail.com", "dylab177151@gmail.com"];
        const loginBtn = document.getElementById("loginBtn");
        const authMsg = document.getElementById("authMsg");
        const formCard = document.getElementById("formCard");
        const listCard = document.getElementById("listCard");
        const saveBtn = document.getElementById("saveBtn");
        const saveMsg = document.getElementById("saveMsg");
        const storeList = document.getElementById("storeList");
        const claimCard = document.getElementById("claimCard");
        const claimList = document.getElementById("claimList");
        let db = null, auth = null, currentUser = null;

        try {
          firebase.initializeApp(window.WIIINFO_FIREBASE_CONFIG);
          auth = firebase.auth();
          db = firebase.firestore();
        } catch (e) { authMsg.textContent = "Firebase 초기화 실패: " + e.message; }

        function isMaster(user) { return user && MASTER_EMAILS.includes((user.email || "").toLowerCase()); }
        function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
        function langObj(ko, en) { const o = { ko: ko || "" }; if (en) o.en = en; return o; }

        loginBtn.addEventListener("click", () => {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          auth.signInWithPopup(provider).catch((err) => { authMsg.textContent = "로그인 실패: " + err.message; });
        });

        auth && auth.onAuthStateChanged((user) => {
          currentUser = user;
          if (!user) { authMsg.textContent = "운영자 계정으로 로그인하세요."; formCard.classList.add("hidden"); listCard.classList.add("hidden"); claimCard.classList.add("hidden"); loginBtn.classList.remove("hidden"); return; }
          if (!isMaster(user)) { authMsg.textContent = `${user.email} 은(는) 운영자 권한이 없습니다.`; formCard.classList.add("hidden"); listCard.classList.add("hidden"); claimCard.classList.add("hidden"); return; }
          authMsg.textContent = `${user.email} (운영자) 로그인됨`;
          loginBtn.classList.add("hidden");
          formCard.classList.remove("hidden");
          listCard.classList.remove("hidden");
          claimCard.classList.remove("hidden");
          loadStores();
          loadClaims();
        });

        function loadStores() {
          storeList.innerHTML = "<p class='notice'>불러오는 중...</p>";
          db.collection("stores").orderBy("createdAt", "desc").limit(50).get().then((snap) => {
            if (snap.empty) { storeList.innerHTML = "<p class='notice'>아직 등록된 점포가 없습니다.</p>"; return; }
            storeList.innerHTML = snap.docs.map((doc) => {
              const d = doc.data();
              return `<div class="storeRow"><div><strong>${esc((d.name && d.name.ko) || "(이름없음)")}</strong><br><small>${esc(d.category || "")} · ${esc((d.address && d.address.ko) || "")}</small></div><button class="ghostBtn" data-del="${esc(doc.id)}">삭제</button></div>`;
            }).join("");
            storeList.querySelectorAll("[data-del]").forEach((b) => b.addEventListener("click", () => {
              if (!confirm("이 점포를 삭제할까요?")) return;
              db.collection("stores").doc(b.dataset.del).delete().then(loadStores);
            }));
          }).catch((err) => { storeList.innerHTML = `<p class='notice'>목록 로드 실패: ${esc(err.message)}</p>`; });
        }

        function loadClaims() {
          claimList.innerHTML = "<p class='notice'>불러오는 중...</p>";
          db.collection("ownerClaims").where("status", "==", "pending").limit(50).get().then((snap) => {
            if (snap.empty) { claimList.innerHTML = "<p class='notice'>대기 중인 신청이 없습니다.</p>"; return; }
            claimList.innerHTML = snap.docs.map((doc) => {
              const c = doc.data();
              const docs = (c.documents || []).map((dd) => `<a href="${esc(dd.url)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:5px;margin-right:8px;font-size:12px;color:#e8602c;text-decoration:underline;">📎 ${esc(dd.type === "business-license" ? "사업자등록증" : "서류")}</a>`).join("");
              return `<div class="storeRow"><div><strong>${esc(c.storeName || "(가게명 없음)")}</strong><br><small>${esc(c.applicantName || "")} · ${esc(c.phone || "")} · ${esc(c.applicantEmail || "")}</small><br>${docs || "<small style='color:#c0392b;'>⚠ 첨부 서류 없음</small>"}</div><div style="display:flex;gap:6px;"><button class="primaryBtn" style="min-height:38px;padding:0 14px;width:auto;" data-approve="${esc(doc.id)}">승인</button><button class="ghostBtn" data-reject="${esc(doc.id)}">반려</button></div></div>`;
            }).join("");
            claimList.querySelectorAll("[data-approve]").forEach((b) => b.addEventListener("click", () => approveClaim(b.dataset.approve)));
            claimList.querySelectorAll("[data-reject]").forEach((b) => b.addEventListener("click", () => rejectClaim(b.dataset.reject)));
          }).catch((err) => { claimList.innerHTML = `<p class='notice'>신청 로드 실패: ${esc(err.message)}</p>`; });
        }

        async function approveClaim(claimId) {
          try {
            const claimDoc = await db.collection("ownerClaims").doc(claimId).get();
            const c = claimDoc.data();
            // 가게명이 등록 점포와 일치하면 ownerUid 자동 연결 + ownerStatus verified
            // [2026-06-18 M5] 동명 가게 오연결 방지: 정확히 1곳일 때만 자동연결
            const matched = await db.collection("stores").where("name.ko", "==", c.storeName).get();
            if (matched.size === 1) {
              await matched.docs[0].ref.update({ ownerUid: c.uid, ownerStatus: "verified" });
              await db.collection("ownerClaims").doc(claimId).update({ status: "approved" });
              alert("승인 + 가게 소유권 연결 완료. 신청자가 사장님으로 관리할 수 있습니다.");
            } else if (matched.size === 0) {
              await db.collection("ownerClaims").doc(claimId).update({ status: "approved" });
              alert("승인했습니다. 단 '" + c.storeName + "'와 일치하는 등록 점포가 없어 소유권 자동연결은 안 됐습니다. 점포를 먼저 등록한 뒤 다시 연결하세요.");
            } else {
              alert("⚠ '" + c.storeName + "' 동명 점포가 " + matched.size + "곳이라 오연결 방지를 위해 자동연결을 막았습니다. 정확한 가게 확인 후 수동 연결이 필요합니다. (승인 보류)");
              return;
            }
            loadClaims();
          } catch (err) { alert("승인 실패: " + err.message); }
        }

        async function rejectClaim(claimId) {
          if (!confirm("이 신청을 반려할까요?")) return;
          try { await db.collection("ownerClaims").doc(claimId).update({ status: "rejected" }); loadClaims(); }
          catch (err) { alert("반려 실패: " + err.message); }
        }

        saveBtn.addEventListener("click", () => {
          const nameKo = document.getElementById("f_name_ko").value.trim();
          const address = document.getElementById("f_address").value.trim();
          if (!nameKo || !address) { saveMsg.textContent = "상호와 주소는 필수입니다."; return; }
          saveBtn.disabled = true; saveMsg.textContent = "저장 중...";
          const nat = document.getElementById("f_nat").value.split(",").map((s) => s.trim()).filter(Boolean).slice(0, 6);
          const data = {
            name: langObj(nameKo, document.getElementById("f_name_en").value.trim()),
            category: document.getElementById("f_category").value,
            nationalities: nat,
            address: langObj(address),
            phone: document.getElementById("f_phone").value.trim(),
            hours: langObj(document.getElementById("f_hours").value.trim()),
            items: langObj(document.getElementById("f_items").value.trim()),
            ownerNote: document.getElementById("f_owner").value.trim(),
            photo: document.getElementById("f_photo").value.trim() || null,
            verified: false,
            source: "master-form",
            createdBy: currentUser.uid,
            createdByEmail: currentUser.email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          };
          db.collection("stores").add(data).then(() => {
            saveMsg.textContent = "✓ 등록 완료";
            ["f_name_ko", "f_name_en", "f_nat", "f_address", "f_phone", "f_hours", "f_items", "f_owner", "f_photo"].forEach((id) => { document.getElementById(id).value = ""; });
            saveBtn.disabled = false;
            loadStores();
          }).catch((err) => { saveMsg.textContent = "저장 실패: " + err.message; saveBtn.disabled = false; });
        });
      })();
    </script>
  </body>
</html>

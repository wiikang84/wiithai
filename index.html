<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wiiInfo</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=20260601-15" />
  </head>
  <body>
    <main class="app">
      <header class="appHeader">
        <nav class="quickNav" aria-label="빠른 이동">
          <button id="homeButton" type="button">홈</button>
          <button id="backButton" type="button">뒤로</button>
        </nav>
        <section class="hero">
          <div class="flagMark" aria-hidden="true">
            <span id="heroFlagEmoji" class="heroFlagEmoji">🇰🇷</span>
          </div>
          <div class="heroCopy">
            <p class="eyebrow">Language · Life · Realty</p>
            <h1>wiiInfo</h1>
            <p class="brandLine">Info by Wii · Korea info by Wii</p>
            <p class="subtitle">윈포는 기준 언어를 고르고 외국어, 한국 생활정보, 부동산 표현까지 이어서 배우는 생활형 정보 앱입니다.</p>
          </div>
        </section>
      </header>

      <section class="stats" aria-label="학습 현황">
        <div class="statCard teal">
          <span id="totalCount">0</span>
          <small>학습 항목</small>
        </div>
        <div class="statCard coral">
          <span id="favoriteCount">0</span>
          <small>즐겨찾기</small>
        </div>
        <div class="statCard yellow">
          <span id="todayCount">10</span>
          <small>오늘 학습</small>
        </div>
      </section>

      <section class="controls" aria-label="문장 필터">
        <div class="controlGrid">
          <div class="countryChooser">
            <div class="chooserHead">
              <p id="audienceLabel" class="controlLabel">Choose your country</p>
              <strong>당신은 어느 나라 사람입니까?</strong>
            </div>
            <div id="profileTabs" class="countryTabs profileTabs" aria-label="국가 선택"></div>
          </div>
          <div class="learningChooser">
            <div>
              <p id="targetLabel" class="controlLabel">Learn</p>
              <div id="targetTabs" class="targetTabs" aria-label="배울 언어 선택"></div>
            </div>
            <div>
              <p id="modeLabel" class="controlLabel">Mode</p>
              <div class="modeTabs" aria-label="학습 모드">
                <button id="phrasesModeButton" class="active" type="button">문장</button>
                <button id="lettersModeButton" type="button">문자</button>
              </div>
            </div>
            <div>
              <p id="voiceLabel" class="controlLabel">Voice</p>
              <div class="voiceTabs" aria-label="목소리 선택">
                <button id="femaleVoiceButton" class="active" type="button">여성</button>
                <button id="maleVoiceButton" type="button">남성</button>
              </div>
            </div>
          </div>
        </div>
        <input id="searchInput" type="search" aria-label="문장과 문자 검색" placeholder="한국어, 외국어, 발음 검색" />
        <div id="categoryTabs" class="tabs"></div>
        <label class="toggle">
          <input id="quizToggle" type="checkbox" />
          <span id="quizLabel">한국어 먼저 보기</span>
        </label>
      </section>

      <section id="phraseList" class="phraseList" aria-label="태국어 문장 목록"></section>
      <section id="letterList" class="letterList" aria-label="태국어 문자 목록" hidden></section>
    </main>

    <template id="phraseCardTemplate">
      <article class="phraseCard">
        <div class="cardHead">
          <div class="cardMeta">
            <span class="numberBadge"></span>
            <span class="tag"></span>
          </div>
          <button class="starButton" type="button" title="즐겨찾기">☆</button>
        </div>
        <p class="korean"></p>
        <p class="thai"></p>
        <p class="roman"></p>
        <div class="actions">
          <button class="speakButton" type="button">▶ 듣기</button>
          <button class="revealButton" type="button">태국어 보기</button>
        </div>
      </article>
    </template>

    <template id="letterCardTemplate">
      <article class="letterCard">
        <div class="letterMark">
          <span class="letterNumber"></span>
          <p class="letter"></p>
        </div>
        <div>
          <p class="letterName"></p>
          <p class="letterSound"></p>
          <p class="letterExample"></p>
        </div>
        <button class="letterSpeakButton" type="button">▶</button>
      </article>
    </template>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js?v=20260601-15"></script>
    <script src="./phrases.js?v=20260601-15"></script>
    <script src="./multilingual-data.js?v=20260601-15"></script>
    <script src="./app.js?v=20260601-15"></script>
  </body>
</html>
